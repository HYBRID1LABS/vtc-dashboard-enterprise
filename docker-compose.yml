version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/vtc.db
    volumes:
      - vtc-data:/data
    restart: unless-stopped
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./dashboard-enterprise:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
volumes:
  vtc-data:
